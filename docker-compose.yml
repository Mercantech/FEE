services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: fee
      POSTGRES_PASSWORD: fee
      POSTGRES_DB: fee
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fee -d fee"]
      interval: 5s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      target: migrator
    environment:
      DATABASE_URL: postgresql://fee:fee@db:5432/fee
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

  app:
    build:
      context: .
      target: runner
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://fee:fee@db:5432/fee
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL:-http://localhost:3000}
      MERCANTEC_CLIENT_ID: ${MERCANTEC_CLIENT_ID}
      MERCANTEC_CLIENT_SECRET: ${MERCANTEC_CLIENT_SECRET}
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  pgdata:
